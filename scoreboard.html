<div style="font-family:Arial, sans-serif; padding:40px; height:90vh; position:relative;">

    <h1 style="text-align:center; font-size:40px;">
        Score
    </h1>

    <div style="
        background:#ADD8E6;
        width:500px;
        height:300px;
        margin:40px auto;
        border-radius:10px;
    ">
    </div>

    <p style="
        text-align:center;
        font-size:30px;
        margin-top:20px;
    ">
        Total Score: 200 / 600
    </p>

    <button style="
        position:absolute;
        bottom:20px;
        left:20px;
        background:black;
        color:white;
        padding:12px 25px;
        font-size:20px;
        border:none;
    ">
        Exit
    </button>

    <button style="
        position:absolute;
        bottom:20px;
        right:20px;
        background:black;
        color:white;
        padding:12px 25px;
        font-size:20px;
        border:none;
    ">
        Back to Home
    </button>

</div>
