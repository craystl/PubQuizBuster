<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pub Quiz Buster</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #111;
        }

        p {
            max-width: 500px;
            font-size: 1.1rem;
            color: #444;
            margin: 0 auto 25px auto;
            line-height: 1.5;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #111;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>

<body>

    <div>
        <h1>Pub Quiz Buster</h1>

        <p>
            A quick quiz game to test your general knowledge.
            Answer questions, track your score, and challenge your friends.
        </p>

        <button onclick="startGame()">Play</button>
    </div>

    <script>
        function startGame() {
            alert("Game starting...");
            // window.location.href = "game.html";
        }
    </script>

</body>
</html>
