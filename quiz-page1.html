<!DOCTYPE html>
<html lang="en"> 
<head> 
    <title>Quiz Game</title>
    <style> 
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            padding-top: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #111;
        }

        p {
            max-width: 500px;
            font-size: 1.1rem;
            color: #444;
            margin: 0 auto 25px auto;
            line-height: 1.5;
        }

        .score {
            position: fixed;
            top: 30px;
            right: 30px;
            font-size: 1.5rem;
            color: #111;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            width: 150px;
            height: 200px;
            background: #9ad5de;
            border-radius: 8px;
            cursor: pointer;
        }

        .timer {
            position: fixed;
            top: 30px;
            left: 30px;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <h1>Memory Flip</h1>
    <p>*Question*</p>
    <div class="score">
        Score:  <span id="score">0</span>
    </div>

    <div class="cards">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
    <div class="timer">
        Time: <span id="timer">60</span>
    </div>
</body>
</html>
