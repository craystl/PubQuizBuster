<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Menu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            padding-top: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #111;
        }

        p {
            max-width: 500px;
            font-size: 1.1rem;
            color: #444;
            margin: 0 auto 25px auto;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: space-between;
            width: 80%;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        span {
            font-size: 1.5rem;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #111;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>
    
<body>
    <h1>Pick a category below to practice!</h1>

    <div class="grid">
        <div class="column">
            <span> Music & Arts </span>
            <button onclick = "document.location = 'game-page.html'"> Game 1 </button>
            <button onclick = "document.location = 'game-page.html'"> Game 2 </button>
            <button onclick = "document.location = 'game-page.html'"> Game 3 </button>
        </div>
        <div class="column">
            <span> History </span>
            <button onclick = "document.location = 'game-page.html'"> Game 4 </button>
            <button onclick = "document.location = 'game-page.html'"> Game 5 </button>
            <button onclick = "document.location = 'game-page.html'"> Game 6 </button>
        </div>
        <div class="column">
            <span> Geography </span>
            <button onclick = "document.location = 'game-page.html'"> Game 7 </button>
            <button onclick = "document.location = 'game-page.html'"> Game 8 </button>
            <button onclick = "document.location = 'game-page.html'"> Game 9 </button>
        </div>
        <div class="column">
            <span> Science & Nature </span>
            <button onclick = "document.location = 'game-page.html'"> Game 10 </button>
            <button onclick = "document.location = 'game-page.html'"> Game 11 </button>
            <button onclick = "document.location = 'game-page.html'"> Game 12 </button>
        </div>
    </div>
</body>
</html>
